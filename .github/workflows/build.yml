name: Build Kafka Project

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-producer:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: producer-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build Producer
        run: mvn clean verify

  build-consumer:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: consumer-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build Consumer
        run: mvn clean verify
